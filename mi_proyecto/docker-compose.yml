services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      # Toma la URI de conexión a Docker desde el .env
      # IMPORTANTE: Ahora requiere autenticación
      - MONGO_URI=${MONGO_URI_DOCKER:-mongodb://root:tu_password_seguro@mongo:27017/hospital_central?authSource=admin}
      - FLASK_DEBUG=1
    volumes:
      - .:/app
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:6.0 # Se recomienda anclar una versión específica por estabilidad
    restart: unless-stopped
    environment:
      # Creación de credenciales por defecto para la base de datos
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER:-root}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-tu_password_seguro}
    healthcheck:
      test: ["CMD", "mongosh", "-u", "${MONGO_ROOT_USER:-root}", "-p", "${MONGO_ROOT_PASSWORD:-tu_password_seguro}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    ports:
      # Al anteponer 127.0.0.1 evitas exponer el puerto a internet público
      - "127.0.0.1:${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: